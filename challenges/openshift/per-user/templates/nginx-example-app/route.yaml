---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: nginx-example
  namespace: {{ .Values.namespacePermissions.user }}-apps
spec:
  to:
    kind: Service
    name: nginx-example
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
