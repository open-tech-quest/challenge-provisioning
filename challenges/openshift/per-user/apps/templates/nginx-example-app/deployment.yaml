kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx-example
  namespace: {{ .Values.namespacePermissions.user }}-apps
  labels:
    app: nginx-example
    app.kubernetes.io/component: nginx-example
    app.kubernetes.io/instance: nginx-example
    app.kubernetes.io/name: nginx-example
    app.kubernetes.io/part-of: nginx-example
    app.openshift.io/runtime: nginx
    app.openshift.io/runtime-namespace: {{ .Values.namespacePermissions.user }}-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-example
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: nginx-example
        deployment: nginx-example
    spec:
      containers:
        - name: nginx-example
          image: quay.io/openshift-examples/otq-openshift/nginx-example-app:202511030852
          ports:
            - containerPort: 8080
              protocol: TCP
          resources: {}
          imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
      imagePullSecrets: []
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
