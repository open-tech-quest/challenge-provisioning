---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: per-user
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
{{- range .Values.multi_user.users }}
      - user: {{ .username | quote }}
{{- end }}
  template:
    metadata:
      name: "{{`{{ user }}`}}-workload"
      namespace: openshift-gitops
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      destination:
        namespace: "{{`{{ user }}`}}-apps"
        server: 'https://kubernetes.default.svc'
      project: default
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        automated:
          prune: false
          selfHeal: false
      source:
        repoURL: https://github.com/open-tech-quest/challenge-provisioning.git
        targetRevision: main
        path: challenges/openshift/per-user/apps
        helm:
          values: |
            namespacePermissions:
              user: "{{`{{ user }}`}}"
              role: admin
